# Interim nginx config used ONLY during the first cert issuance.
# Same as the previous HTTP-only config, plus the ACME challenge location.
# After certbot succeeds, swap to nginx-ncn-core-console.conf and reload.

upstream ncn_api {
    server 127.0.0.1:9000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name example.com www.example.com _;

    # Let's Encrypt webroot challenge — MUST be reachable before issuance
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    root /opt/ncn-core-console/dist;
    index index.html;

    access_log /var/log/nginx/ncn-access.log;
    error_log  /var/log/nginx/ncn-error.log warn;

    location /api/ {
        proxy_pass         http://ncn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        client_max_body_size 4k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location ~ /\.(?!well-known) {
        deny all;
    }
}
