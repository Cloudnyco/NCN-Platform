# ncn-textfile — serves the PITR base-backup freshness textfile to Prometheus,
# localhost-only on pop-03 (Prometheus runs there too). The basebackup script
# writes /var/mail/vhosts/ncn-mon/pitr.prom; this exposes it as a scrape target
# so Grafana can graph "time since last base backup". Isolated server block on a
# dedicated port so it never interacts with the mail / admin vhosts.
# Installed at /etc/nginx/conf.d/ncn-textfile.conf on pop-03.
server {
    listen 127.0.0.1:9102;
    server_name _;
    access_log off;
    location = /metrics {
        default_type text/plain;
        alias /var/mail/vhosts/ncn-mon/pitr.prom;
    }
    location / { return 404; }
}
