# /etc/nginx/sites-available/ncn-core-console
#
# Three server roles share this file:
#   1. example.com / www.example.com — public face (Landing, Looking Glass).
#      Admin paths and protected APIs are blocked here.
#   2. admin.example.com — operator console + full /api/* + WS terminal.
#      Separate hostname → separate cookie scope → cleaner blast radius.
#   3. Port-80 listener handles ACME challenges + HTTPS redirect for both.

# WebSocket upgrade helper.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream ncn_api {
    server 127.0.0.1:9000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Shared snippets — common proxy + security headers
# ---------------------------------------------------------------------------
# (inlined per-location below for clarity; nginx doesn't allow `include`
# inside `location` blocks without absolute paths)

# ---------------------------------------------------------------------------
# Port 80 — both hosts. ACME challenge passthrough + HTTPS redirect.
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name example.com www.example.com admin.example.com _;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================================================
# PUBLIC — example.com / www.example.com
# ---------------------------------------------------------------------------
# Serves Landing + Looking Glass.
# Admin paths and protected APIs are forbidden/redirected.
# ===========================================================================
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name example.com www.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    root /opt/ncn-core-console/dist;
    index index.html;
    access_log /var/log/nginx/ncn-public-access.log;
    error_log  /var/log/nginx/ncn-public-error.log warn;

    # --- Block admin SPA + login routes ---
    # Redirect to dedicated admin host. Operators bookmark these URLs;
    # we don't 404 them to preserve workflows.
    location /admin    { return 301 https://admin.example.com$request_uri; }
    location = /login  { return 301 https://admin.example.com/login$is_args$args; }

    # Docs live on the dedicated wiki host (wiki.example.com is canonical). This
    # host does NOT proxy /api/v1/wiki/, so a direct hit to /docs here would
    # load the SPA but every wiki fetch would 404 — forward to the real host.
    location /docs { return 301 https://wiki.example.com$request_uri; }

    # --- /api allow-list ---
    # Each public endpoint is whitelisted explicitly. Anything else under
    # /api/ returns 404 from this host.
    location = /api/v1/health           { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/visitor          { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/fleet/public     { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/incidents/public { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/status/summary   { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/status/latency   { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/peeringdb        { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    # Public peering-application intake (the /peering-apply form POSTs here).
    location = /api/v1/peering/apply    { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location /api/v1/lg/                { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }

    # --- Prometheus scrape (private backbone only) ---
    # /metrics is not part of the public API; restrict to the v6 backbone so
    # only the pop-03 monitoring host can scrape it. Reveals counts, no secrets.
    location = /metrics {
        allow 2001:db8:50::/44;
        allow ::1;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://ncn_api;
        include /etc/nginx/snippets/ncn-api-proxy.conf;
    }

    # Everything else under /api/ is admin-only and not allowed from the
    # public host. Return 404 (not 403) to avoid revealing route shape.
    location /api/ { return 404; }

    # --- SPA shell (Landing + Looking Glass routes) ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Set-Cookie "ncn_session=; Path=/; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
    }
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        # Tombstone any pre-split (pre-admin.example.com) session cookie still
        # in the browser. Public host should never hold an auth cookie.
        add_header Set-Cookie "ncn_session=; Path=/; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
        expires 0;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location ~ /\.(?!well-known) { deny all; }
}

# ===========================================================================
# ADMIN — admin.example.com
# ---------------------------------------------------------------------------
# Operator console. All /api/* allowed including WS /api/v1/term.
# Cookie scope is bound to admin.example.com so it never leaks to the
# public host.
# Cert: starts on the existing example.com cert (browser name-mismatch
# warning) until certbot issues a dedicated cert for this hostname.
# ===========================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.example.com;
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    # SWAP THIS PAIR after `certbot certonly -d admin.example.com` runs:
    # ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
    ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Aggressive HSTS — this hostname should never speak HTTP.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff";
    # Block embedding entirely — admin must never be iframed.
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "no-referrer";
    # Disallow indexing.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    root /opt/ncn-core-console/dist;
    index index.html;
    access_log /var/log/nginx/ncn-admin-access.log;
    error_log  /var/log/nginx/ncn-admin-error.log warn;

    # --- WebSocket terminal — long-lived upgrade ---
    location = /api/v1/term {
        proxy_pass         http://ncn_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 12h;
        proxy_send_timeout 12h;
        proxy_buffering    off;
    }

    # --- Embedded Grafana (admin-gated in ncn-api; same-origin iframe) ---
    location /grafana/ {
        proxy_pass         http://ncn_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_buffering    off;
        # server-level X-Frame-Options is DENY; allow the console to iframe Grafana
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # --- Internal ops wiki ---
    # RETIRED the old static MkDocs handbook (served from /opt/ncn-core-console/
    # wikiroot via an auth_request subrequest). The ops handbook now lives in the
    # self-hosted wiki as the SPA route /admin/wiki (operator-gated by ncn-api,
    # content in Postgres). Forward old bookmarks so no workflow 404s. The
    # wikiroot/ dir can be deleted from disk once nothing references it.
    location = /wiki { return 301 /admin/wiki; }
    location /wiki/  { return 301 /admin/wiki; }

    # --- All /api/* allowed here ---
    location /api/ {
        proxy_pass         http://ncn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        client_max_body_size 64k;
        add_header Cache-Control "no-store" always;
    }

    # --- SPA shell ---
    # Default landing for admin host = the login page (operators don't need
    # to see the public Landing here).
    location = / { return 302 /admin; }

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location ~ /\.(?!well-known) { deny all; }
}

# ===========================================================================
# wiki.example.com — self-hosted public wiki. CF-proxied; LE cert via DNS-01.
# Serves the console SPA dist (public WikiPublic view) + proxies the PUBLIC wiki
# API to ncn-api, which server-side-enforces is_public so internal pages never
# leak. (Wiki.js is retained as a one-line rollback: restore the old
# `proxy_pass http://127.0.0.1:3002` block + its tunnel on pop-03.)
# ===========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name wiki.example.com;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wiki.example.com;
    ssl_certificate     /etc/letsencrypt/live/wiki.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.example.com/privkey.pem;
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # Self-hosted wiki = the console SPA (public wiki view) + the public wiki API.
    # (Wiki.js is retired off this host but kept running as backup on pop-03 —
    #  to roll back, restore the old `proxy_pass http://127.0.0.1:3002` block.)
    root /opt/ncn-core-console/dist;
    index index.html;
    access_log /var/log/nginx/ncn-wiki-access.log;

    location = / { return 302 /docs; }

    # Public wiki API only (anonymous; ncn-api forces is_public). Everything else
    # under /api/ is not served from this host (auth APIs need the admin-host cookie).
    location /api/v1/wiki/    { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/health { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location = /api/v1/visitor { proxy_pass http://ncn_api; include /etc/nginx/snippets/ncn-api-proxy.conf; }
    location /api/ { return 404; }

    location /assets/ { access_log off; expires 1y; add_header Cache-Control "public, immutable"; }
    location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; expires 0; }
    location / { try_files $uri $uri/ /index.html; }

    gzip on; gzip_vary on; gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    location ~ /\.(?!well-known) { deny all; }
}
